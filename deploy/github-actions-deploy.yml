# GitHub Actions — Critsend Auto-Deploy
#
# Triggers on every push to the `main` branch.
# SSHes into the production server and runs deploy/deploy.sh.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   SSH_HOST  — Public IP or hostname of your server (e.g. 203.0.113.42)
#   SSH_USER  — SSH login user (e.g. ubuntu)
#   SSH_KEY   — Full contents of the private SSH key (~/.ssh/id_ed25519)
#               The matching public key must be in ~/.ssh/authorized_keys on the server.
#
# Optional secret:
#   APP_URL   — Full HTTPS URL of the app (e.g. https://yourdomain.com).
#               Required for the post-deploy health check step.
#               If not set, the health check step is skipped.
#               Do NOT use SSH_HOST here — bare IPs fail TLS validation.
#
# To add the public key on the server:
#   ssh-keygen -t ed25519 -C "github-actions-deploy"
#   cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
#   # Then copy the private key contents into the SSH_KEY secret.

name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (for reference only — server pulls via git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/critsend
            bash deploy/deploy.sh

      - name: Health check
        # Requires APP_URL secret (e.g. https://yourdomain.com).
        # Using SSH_HOST directly would fail TLS validation if it is a bare IP.
        # If APP_URL is not set, this step is skipped gracefully.
        if: ${{ secrets.APP_URL != '' }}
        run: |
          # Wait up to 30 seconds for the app to become healthy after reload
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.APP_URL }}/api/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 30s"
          exit 1
