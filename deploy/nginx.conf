# Nginx configuration for Critsend
#
# SETUP INSTRUCTIONS (run in order):
#   1. Copy this file:
#        sudo cp /home/ubuntu/critsend/deploy/nginx.conf /etc/nginx/sites-available/critsend
#   2. Replace the placeholder domain:
#        sudo sed -i 's/yourdomain.com/YOUR_ACTUAL_DOMAIN/g' /etc/nginx/sites-available/critsend
#   3. Enable and test (HTTP-only at this point — works without SSL certs):
#        sudo ln -sf /etc/nginx/sites-available/critsend /etc/nginx/sites-enabled/critsend
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo nginx -t && sudo systemctl reload nginx
#   4. Obtain SSL cert (certbot rewrites this file to add the HTTPS block automatically):
#        sudo certbot --nginx -d yourdomain.com
#   5. Reload Nginx after certbot:
#        sudo systemctl reload nginx
#
# After step 4, certbot will have inserted ssl_certificate directives and a 301 redirect.
# The HTTP→HTTPS redirect and HTTPS block below are added by certbot — you do not edit them.

# ─── Upstream ────────────────────────────────────────────────────────────────
upstream critsend_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ─── WebSocket upgrade map ────────────────────────────────────────────────────
# Must live in the http {} block. If your server already has a connection_upgrade
# map in /etc/nginx/nginx.conf, remove this block to avoid duplicate-map errors.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ─── HTTP server ──────────────────────────────────────────────────────────────
# Phase 1 (before certbot): This block serves the app over HTTP and handles the
#   ACME challenge for cert issuance.
# Phase 2 (after certbot): certbot rewrites this block to a 301 HTTPS redirect
#   and appends the HTTPS server block automatically.
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge — certbot needs this path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Client upload limit (CSV imports up to 1 GB) ─────────────────────────
    client_max_body_size 1100m;
    client_body_timeout 600s;

    # ─── SSE endpoint — disable buffering so events stream in real-time ───────
    location ~ ^/api/jobs/stream {
        proxy_pass http://critsend_app;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Main proxy ───────────────────────────────────────────────────────────
    location / {
        proxy_pass http://critsend_app;
        proxy_http_version 1.1;

        # $connection_upgrade resolves to "upgrade" when an Upgrade header is
        # present (WebSocket), or "" (empty = keepalive) for regular requests.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long-running requests (import, campaign send)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}

# ─── HTTPS server (managed by certbot) ───────────────────────────────────────
# certbot --nginx adds this block automatically when you run step 4 above.
# Do NOT uncomment this manually before running certbot — nginx -t will fail
# if the certificate files do not exist yet.
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name yourdomain.com www.yourdomain.com;
#
#     # certbot fills these in:
#     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
#
#     # ... (same proxy blocks as above, certbot copies them here)
# }
